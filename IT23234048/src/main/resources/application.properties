spring.application.name=IT23234048
spring.data.mongodb.uri=${MONGODB_URI}
spring.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=studentdb
spring.data.mongodb.auto-index-creation=true

# OAuth2 (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-random-string-change-me-to-a-long-random-string}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

# Frontend redirect after OAuth2 success
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}